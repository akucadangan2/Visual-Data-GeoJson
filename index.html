<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Visualisasi 3D WebGIS - RDTR Bandung</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4;}
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Panel Kontrol Utama */
        #control-panel {
            position: absolute;
            z-index: 1;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            width: 270px;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-height: 90vh;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 13px;
            font-weight: 800;
            color: #2c3e50;
            margin: 0 0 10px 0;
            padding-bottom: 6px;
            border-bottom: 2px solid #3498db;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .item-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
            color: #333;
            cursor: pointer;
        }

        .item-row input, .item-row select { margin-right: 10px; cursor: pointer; }

        /* Dropdown Peta Dasar */
        #basemap-selector {
            width: 100%;
            padding: 7px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-bottom: 18px;
            font-size: 12px;
            background-color: #fff;
        }

        /* Container khusus radio button agar menjorok ke dalam */
        #status-radios {
            margin-left: 25px;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 2px solid #ddd;
            display: none; 
        }

        /* Styling Legenda */
        .legend-section {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #e9ecef;
            display: none; 
        }

        .legend-title { font-size: 11px; font-weight: bold; margin-bottom: 8px; color: #555; text-transform: uppercase;}
        .legend-box { width: 14px; height: 14px; border-radius: 3px; margin-right: 8px; display: inline-block; vertical-align: middle; border: 1px solid rgba(0,0,0,0.2); }
        .legend-line { width: 16px; height: 3px; margin-right: 8px; display: inline-block; vertical-align: middle; }

        /* Styling Popup Custom yang Rapi */
        .maplibregl-popup-content {
            border-radius: 6px;
            padding: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            min-width: 260px;
        }
        .popup-header {
            margin: 0 0 8px;
            color: #2c3e50;
            border-bottom: 1px solid #eee;
            padding-bottom: 6px;
        }
        .popup-title { font-size: 14px; font-weight: bold; margin: 0 0 2px 0; }
        .popup-subtitle { color: #7f8c8d; font-size: 11px; font-style: italic; margin: 0;}
        
        .popup-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 5px;}
        .popup-table tr { border-bottom: 1px solid #f1f2f6; }
        .popup-table td { padding: 5px 2px; vertical-align: top;}
        .popup-table td:first-child { font-weight: 600; color: #34495e; width: 40%;}
        
        .tag-sesuai { display: inline-block; background: #28a745; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold;}
        .tag-tidak { display: inline-block; background: #dc3545; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold;}
        .badge-info { background: #3498db; color: white; padding: 2px 5px; border-radius: 3px; font-size: 10px;}
    </style>
</head>
<body>

<div id="control-panel">
    <h3 class="panel-title">Pilihan Peta Dasar</h3>
    <select id="basemap-selector">
        <option value="https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json">Satelit / Berwarna (Voyager)</option>
        <option value="https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json">Gelap (Dark Matter)</option>
        <option value="https://basemaps.cartocdn.com/gl/positron-gl-style/style.json">Terang (Positron)</option>
    </select>

    <h3 class="panel-title">Pengaturan Peta</h3>
    <label class="item-row"><input type="checkbox" id="chk-batas" checked> Batas Penelitian</label>
    <label class="item-row"><input type="checkbox" id="chk-zonasi"> Zonasi RDTR</label>
    <label class="item-row"><input type="checkbox" id="chk-lahan"> Bidang Lahan</label>
    <label class="item-row"><input type="checkbox" id="chk-bangunan"> Bangunan Kajian (3D)</label>

    <div id="status-radios">
        <div style="font-size: 11px; color:#777; margin-bottom: 6px; font-weight: bold;">TEMA WARNA BANGUNAN:</div>
        <label class="item-row"><input type="radio" name="status" value="default" checked> Warna Default</label>
        <label class="item-row"><input type="radio" name="status" value="STS_KDB"> Status KDB</label>
        <label class="item-row"><input type="radio" name="status" value="STS_KLB"> Status KLB</label>
        <label class="item-row"><input type="radio" name="status" value="STS_KDH"> Status KDH</label>
    </div>

    <h3 class="panel-title" style="margin-top: 15px;">Legenda Data</h3>
    
    <div id="legenda-batas" class="legend-section" style="display: block;">
        <div class="legend-title">Batas Penelitian</div>
        <div class="item-row"><span class="legend-line" style="background-color: #bc4749; height: 4px;"></span> Kawasan Studi</div>
    </div>
    
    <div id="legenda-zonasi" class="legend-section">
        <div class="legend-title">Zonasi RDTR</div>
        <div class="item-row"><span class="legend-box" style="background-color: #f2e8cf;"></span> Area Zonasi Tata Ruang</div>
    </div>
    
    <div id="legenda-lahan" class="legend-section">
        <div class="legend-title">Bidang Lahan</div>
        <div class="item-row"><span class="legend-line" style="background-color: #386641;"></span> Batas Persil (Hak Tanah)</div>
    </div>
    
    <div id="legenda-bangunan" class="legend-section">
        <div class="legend-title">Bangunan (KDB/KLB/KDH)</div>
        <div class="item-row"><span class="legend-box" style="background-color: #28a745;"></span> Memenuhi Ketentuan (Sesuai)</div>
        <div class="item-row"><span class="legend-box" style="background-color: #dc3545;"></span> Melanggar (Tidak Sesuai)</div>
        <div class="item-row"><span class="legend-box" style="background-color: #b5c99a;"></span> Mode Visual Default</div>
    </div>
</div>

<div id="map"></div>

<script>
    // State Global
    const state = {
        layers: {
            'Batas Penelitian': true, 
            'Zonasi RDTR': false,
            'Bidang Lahan': false,
            'Bangunan 3D': false
        },
        bangunanColorProp: 'default',
        isInitialLoad: true
    };

    // ==========================================
    // INISIALISASI PETA DENGAN PERSPEKTIF 3D
    // ==========================================
    const map = new maplibregl.Map({
        container: 'map',
        style: document.getElementById('basemap-selector').value,
        center: [107.61, -6.91], // Kordinat default Bandung
        zoom: 14,                // Zoom sedikit lebih dekat
        pitch: 60,               // <--- INI KUNCINYA: Kamera langsung miring 60 derajat
        bearing: -20,            // <--- Kamera sedikit diputar
        antialias: true
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    function getBangunanColor() {
        if (state.bangunanColorProp === 'default') return '#b5c99a';
        return [
            'match',
            ['get', state.bangunanColorProp],
            'Sesuai', '#28a745',
            'Tidak Sesuai', '#dc3545',
            '#b5c99a' 
        ];
    }

    function loadCustomLayers() {
        if (!map.getSource('zonasi')) {
            map.addSource('zonasi', { type: 'geojson', data: './data/Zonasi RDTR.geojson' });
            map.addLayer({
                'id': 'Zonasi RDTR', 'type': 'fill', 'source': 'zonasi',
                'layout': { 'visibility': state.layers['Zonasi RDTR'] ? 'visible' : 'none' },
                'paint': { 'fill-color': '#f2e8cf', 'fill-opacity': 0.6 }
            });
        }

        if (!map.getSource('lahan')) {
            map.addSource('lahan', { type: 'geojson', data: './data/Bidang Lahan.geojson' });
            map.addLayer({
                'id': 'Bidang Lahan', 'type': 'line', 'source': 'lahan',
                'layout': { 'visibility': state.layers['Bidang Lahan'] ? 'visible' : 'none' },
                'paint': { 'line-color': '#386641', 'line-width': 1.5, 'line-opacity': 0.9 }
            });
        }

        if (!map.getSource('batas')) {
            map.addSource('batas', { type: 'geojson', data: './data/Batas Penelitian.geojson' });
            map.addLayer({
                'id': 'Batas Penelitian', 'type': 'line', 'source': 'batas',
                'layout': { 'visibility': state.layers['Batas Penelitian'] ? 'visible' : 'none' },
                'paint': { 'line-color': '#bc4749', 'line-width': 3.5 }
            });
        }

        if (!map.getSource('bangunan')) {
            map.addSource('bangunan', { type: 'geojson', data: './data/Bangunan_Kajian.geojson' });
            map.addLayer({
                'id': 'Bangunan 3D', 'type': 'fill-extrusion', 'source': 'bangunan',
                'layout': { 'visibility': state.layers['Bangunan 3D'] ? 'visible' : 'none' },
                'paint': {
                    'fill-extrusion-color': getBangunanColor(),
                    'fill-extrusion-height': ['coalesce', ['get', 'measuredHe'], ['get', 'HMAX'], 10],
                    'fill-extrusion-base': 0,
                    'fill-extrusion-opacity': 0.95
                }
            });
        }
    }

    map.on('style.load', () => {
        loadCustomLayers();

        if (state.isInitialLoad) {
            fetch('./data/Batas Penelitian.geojson')
                .then(res => res.json())
                .then(data => {
                    const bbox = turf.bbox(data);
                    // Pastikan auto-zoom mempertahankan kemiringan 3D
                    map.fitBounds(bbox, { padding: 50, pitch: 60, bearing: -20, duration: 2500 });
                }).catch(err => console.error('Error Auto-Zoom:', err));
            state.isInitialLoad = false;
        }
    });

    // ==========================================
    // UI CONTROLS
    // ==========================================
    document.getElementById('basemap-selector').addEventListener('change', function(e) {
        map.setStyle(e.target.value); 
    });

    function setupToggle(checkboxId, layerId, legendId) {
        document.getElementById(checkboxId).addEventListener('change', function(e) {
            const isChecked = e.target.checked;
            state.layers[layerId] = isChecked; 
            
            if (map.getLayer(layerId)) {
                map.setLayoutProperty(layerId, 'visibility', isChecked ? 'visible' : 'none');
            }
            document.getElementById(legendId).style.display = isChecked ? 'block' : 'none';
            if(layerId === 'Bangunan 3D') {
                document.getElementById('status-radios').style.display = isChecked ? 'block' : 'none';
            }
        });
    }
    setupToggle('chk-batas', 'Batas Penelitian', 'legenda-batas');
    setupToggle('chk-zonasi', 'Zonasi RDTR', 'legenda-zonasi');
    setupToggle('chk-lahan', 'Bidang Lahan', 'legenda-lahan');
    setupToggle('chk-bangunan', 'Bangunan 3D', 'legenda-bangunan');

    document.querySelectorAll('input[name="status"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            state.bangunanColorProp = e.target.value;
            if (map.getLayer('Bangunan 3D')) {
                map.setPaintProperty('Bangunan 3D', 'fill-extrusion-color', getBangunanColor());
            }
        });
    });

    // ==========================================
    // INTERAKSI POPUP (SUPER SMART CLICK HANDLER)
    // ==========================================
    const popup = new maplibregl.Popup({ closeButton: true, closeOnClick: true, maxWidth: '320px' });

    const formatNum = (num) => num ? parseFloat(num).toLocaleString('id-ID', {maximumFractionDigits: 2}) : '-';
    
    const formatStatus = (val) => {
        if (!val || val === '-') return '-';
        return val === 'Sesuai' ? `<span class="tag-sesuai">SESUAI</span>` : `<span class="tag-tidak">TIDAK SESUAI</span>`;
    };

    map.on('click', (e) => {
        const features = map.queryRenderedFeatures(e.point, {
            layers: ['Bangunan 3D', 'Bidang Lahan', 'Zonasi RDTR', 'Batas Penelitian']
        });

        if (!features.length) return;

        const feature = features[0];
        const props = feature.properties;
        const layerId = feature.layer.id;

        let html = '';

        if (layerId === 'Bangunan 3D') {
            html = `
                <div class="popup-header">
                    <div class="popup-title">${props.NAMOBJ || 'Bangunan'}</div>
                    <div class="popup-subtitle">${props.REMARK || 'Fungsi tidak tersedia'}</div>
                </div>
                <table class="popup-table">
                    <tr><td>NIB / Status Hak</td><td>: ${props.NIB || '-'} / <span class="badge-info">${props.STSKTN || '-'}</span></td></tr>
                    <tr><td>Zonasi</td><td>: ${props.NM_ZONA || '-'} (${props.KD_ZONA || '-'})</td></tr>
                    <tr><td>Tinggi Bangunan</td><td>: ${formatNum(props.measuredHe || props.HMAX)} Meter</td></tr>
                    <tr><td>Luas Lahan (m²)</td><td>: ${formatNum(props.LUAS_TNH)}</td></tr>
                    <tr><td>Luas Bangunan (m²)</td><td>: ${formatNum(props.LUAS_BGN)}</td></tr>
                    <tr><td colspan="2" style="padding-top:8px; border-bottom:none;"><strong>Evaluasi Tata Ruang:</strong></td></tr>
                    <tr><td>KDB (Maks: ${props.KDB_MAX}%)</td><td>: ${formatNum(props.KDB)}% ${formatStatus(props.STS_KDB)}</td></tr>
                    <tr><td>KLB (Maks: ${props.KLB_MAX})</td><td>: ${formatNum(props.KLB)} ${formatStatus(props.STS_KLB)}</td></tr>
                    <tr><td>KDH (Min: ${props.KDH_MIN}%)</td><td>: ${formatNum(props.KDH)}% ${formatStatus(props.STS_KDH)}</td></tr>
                </table>
            `;
        } 
        else if (layerId === 'Bidang Lahan') {
            html = `
                <div class="popup-header">
                    <div class="popup-title">Informasi Persil Lahan</div>
                </div>
                <table class="popup-table">
                    <tr><td>NIB</td><td>: <strong>${props.NIB || '-'}</strong></td></tr>
                    <tr><td>Status Hak</td><td>: <span class="badge-info">${props.STSKTN || '-'}</span></td></tr>
                    <tr><td>Luas Tanah</td><td>: ${formatNum(props.LUAS_TNH)} m²</td></tr>
                    <tr><td>Sumber Data</td><td>: ${props.SUMBER || '-'}</td></tr>
                </table>
            `;
        } 
        else if (layerId === 'Zonasi RDTR') {
            html = `
                <div class="popup-header">
                    <div class="popup-title">Zona: ${props.NM_ZONA || '-'}</div>
                    <div class="popup-subtitle">Sub-Zona: ${props.NM_SUBZON || '-'} (${props.KD_SUBZON || '-'})</div>
                </div>
                <table class="popup-table">
                    <tr><td>KDB Maksimal</td><td>: ${props.KDB_MAX}%</td></tr>
                    <tr><td>KLB Maksimal</td><td>: ${props.KLB_MAX}</td></tr>
                    <tr><td>KDH Minimal</td><td>: ${props.KDH_MIN}%</td></tr>
                    <tr><td>Kecamatan</td><td>: ${props.KECAMATAN || '-'}</td></tr>
                    <tr><td>Sumber Data</td><td>: ${props.SUMBER || '-'} (${props.THN_DATA || '-'})</td></tr>
                </table>
            `;
        } 
        else if (layerId === 'Batas Penelitian') {
            html = `
                <div class="popup-header">
                    <div class="popup-title">${props.NAMOBJ || 'Batas Kajian'}</div>
                    <div class="popup-subtitle">${props.TIPADM || '-'}</div>
                </div>
                <table class="popup-table">
                    <tr><td>Keterangan</td><td>: ${props.REMARK || '-'}</td></tr>
                    <tr><td>Lokasi</td><td>: Kec. ${props.WADMKC || '-'}, ${props.WADMKK || '-'}</td></tr>
                    <tr><td>Luas Area</td><td>: ${formatNum(props.SHAPE_Area)} m²</td></tr>
                </table>
            `;
        }

        popup.setLngLat(e.lngLat).setHTML(html).addTo(map);
    });

    // Ubah Kursor saat mouse berada di atas layer interaktif
    const interactiveLayers = ['Bangunan 3D', 'Bidang Lahan', 'Zonasi RDTR', 'Batas Penelitian'];
    interactiveLayers.forEach(layer => {
        map.on('mouseenter', layer, () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', layer, () => map.getCanvas().style.cursor = '');
    });

</script>
</body>
</html>
