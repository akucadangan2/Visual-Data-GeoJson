<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Visualisasi 3D WebGIS LOD2 - RDTR Bandung</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4;}
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        #control-panel {
            position: absolute; z-index: 1; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.95); padding: 15px 20px;
            border-radius: 8px; width: 270px; border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto;
        }

        .panel-title {
            font-size: 13px; font-weight: 800; color: #2c3e50;
            margin: 0 0 10px 0; padding-bottom: 6px;
            border-bottom: 2px solid #3498db; text-transform: uppercase;
        }

        .item-row { display: flex; align-items: center; margin-bottom: 10px; font-size: 13px; color: #333; cursor: pointer; }
        .item-row input, .item-row select { margin-right: 10px; }

        #basemap-selector { width: 100%; padding: 7px; border-radius: 4px; border: 1px solid #ccc; margin-bottom: 18px; }

        #status-radios { margin-left: 25px; margin-bottom: 15px; padding-left: 10px; border-left: 2px solid #ddd; }

        .legend-section {
            margin-top: 10px; padding: 10px; background: #f8f9fa;
            border-radius: 6px; border: 1px solid #e9ecef;
        }

        .legend-title { font-size: 11px; font-weight: bold; margin-bottom: 8px; color: #555; text-transform: uppercase;}
        .legend-box { width: 14px; height: 14px; border-radius: 3px; margin-right: 8px; display: inline-block; vertical-align: middle; border: 1px solid rgba(0,0,0,0.2); }
        .legend-line { width: 16px; height: 3px; margin-right: 8px; display: inline-block; vertical-align: middle; }

        .maplibregl-popup-content { border-radius: 6px; padding: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); min-width: 260px; }
        .popup-header { margin: 0 0 8px; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .popup-title { font-size: 14px; font-weight: bold; }
        .popup-subtitle { color: #7f8c8d; font-size: 11px; font-style: italic; }
        
        .popup-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 5px;}
        .popup-table tr { border-bottom: 1px solid #f1f2f6; }
        .popup-table td { padding: 5px 2px; vertical-align: top;}
        .popup-table td:first-child { font-weight: 600; color: #34495e; width: 40%;}
        
        .tag-sesuai { background: #28a745; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold;}
        .tag-tidak { background: #dc3545; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold;}
    </style>
</head>
<body>

<div id="control-panel">
    <h3 class="panel-title">Pilihan Peta Dasar</h3>
    <select id="basemap-selector">
        <option value="https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json">Satelit / Berwarna (Voyager)</option>
        <option value="https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json">Gelap (Dark Matter)</option>
        <option value="https://basemaps.cartocdn.com/gl/positron-gl-style/style.json">Terang (Positron)</option>
    </select>

    <h3 class="panel-title">Pengaturan Peta</h3>
    <label class="item-row"><input type="checkbox" id="chk-batas" checked> Batas Penelitian</label>
    <label class="item-row"><input type="checkbox" id="chk-zonasi"> Zonasi RDTR</label>
    <label class="item-row"><input type="checkbox" id="chk-lahan"> Bidang Lahan</label>
    <label class="item-row"><input type="checkbox" id="chk-bangunan" checked> Bangunan LOD2 (3D)</label>

    <div id="status-radios">
        <div style="font-size: 11px; color:#777; margin-bottom: 6px; font-weight: bold;">TEMA WARNA BANGUNAN:</div>
        <label class="item-row"><input type="radio" name="status" value="default" checked> Warna Default</label>
        <label class="item-row"><input type="radio" name="status" value="STS_KDB"> Status KDB</label>
        <label class="item-row"><input type="radio" name="status" value="STS_KLB"> Status KLB</label>
        <label class="item-row"><input type="radio" name="status" value="STS_KDH"> Status KDH</label>
    </div>

    <h3 class="panel-title" style="margin-top: 15px;">Legenda Data</h3>
    <div id="legenda-batas" class="legend-section" style="display: block;">
        <div class="legend-title">Batas Penelitian</div>
        <div class="item-row"><span class="legend-line" style="background-color: #bc4749;"></span> Kawasan Studi</div>
    </div>
    <div id="legenda-zonasi" class="legend-section">
        <div class="legend-title">Zonasi RDTR</div>
        <div class="item-row"><span class="legend-box" style="background-color: #f2e8cf;"></span> Area Zonasi</div>
    </div>
    <div id="legenda-lahan" class="legend-section">
        <div class="legend-title">Bidang Lahan</div>
        <div class="item-row"><span class="legend-line" style="background-color: #386641;"></span> Batas Persil</div>
    </div>
    <div id="legenda-bangunan" class="legend-section" style="display: block;">
        <div class="legend-title">Bangunan LOD2</div>
        <div class="item-row"><span class="legend-box" style="background-color: #28a745;"></span> Sesuai</div>
        <div class="item-row"><span class="legend-box" style="background-color: #dc3545;"></span> Tidak Sesuai</div>
        <div class="item-row"><span class="legend-box" style="background-color: #b5c99a;"></span> Default</div>
    </div>
</div>

<div id="map"></div>

<script>
    const state = {
        layers: { 'Batas Penelitian': true, 'Zonasi RDTR': false, 'Bidang Lahan': false, 'Bangunan 3D': true },
        bangunanColorProp: 'default',
        isInitialLoad: true
    };

    const map = new maplibregl.Map({
        container: 'map',
        style: document.getElementById('basemap-selector').value,
        center: [107.61, -6.91],
        zoom: 16.5,
        pitch: 62,
        bearing: -35,
        antialias: true
    });

    map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');

    function getBangunanColor() {
        if (state.bangunanColorProp === 'default') return '#b5c99a';
        return ['match', ['get', state.bangunanColorProp],
            'Sesuai', '#28a745',
            'Tidak Sesuai', '#dc3545',
            '#b5c99a'
        ];
    }

    function loadCustomLayers() {
        // Batas
        if (!map.getSource('batas')) {
            map.addSource('batas', { type: 'geojson', data: './GEOJESN/GEOJESN_FIX/Batas Penelitian.geojson' });
            map.addLayer({ id: 'Batas Penelitian', type: 'line', source: 'batas',
                paint: { 'line-color': '#bc4749', 'line-width': 4 }, layout: {visibility: 'visible'}
            });
        }

        // Zonasi
        if (!map.getSource('zonasi')) {
            map.addSource('zonasi', { type: 'geojson', data: './GEOJESN/GEOJESN_FIX/Zonasi RDTR.geojson' });
            map.addLayer({ id: 'Zonasi RDTR', type: 'fill', source: 'zonasi',
                paint: { 'fill-color': '#f2e8cf', 'fill-opacity': 0.5 }, layout: {visibility: 'none'}
            });
        }

        // Lahan
        if (!map.getSource('lahan')) {
            map.addSource('lahan', { type: 'geojson', data: './GEOJESN/GEOJESN_FIX/Bidang Lahan.geojson' });
            map.addLayer({ id: 'Bidang Lahan', type: 'line', source: 'lahan',
                paint: { 'line-color': '#386641', 'line-width': 1.8 }, layout: {visibility: 'none'}
            });
        }

        // ================== BANGUNAN LOD2 (Single Layer) ==================
        if (!map.getSource('bangunan')) {
            map.addSource('bangunan', { type: 'geojson', data: './GEOJESN/GEOJESN_FIX/Bangunan_Kajian.geojson' });
            
            map.addLayer({
                id: 'Bangunan 3D',
                type: 'fill-extrusion',
                source: 'bangunan',
                layout: { visibility: 'visible' },
                paint: {
                    'fill-extrusion-color': getBangunanColor(),
                    
                    // Menggunakan data ketinggian yang sudah ada di GeoJSON
                    'fill-extrusion-height': [
                        'coalesce',
                        ['get', 'MAX_HEIGHT'],
                        ['get', 'measuredHe'],
                        ['get', 'HMAX'],
                        8
                    ],
                    'fill-extrusion-base': [
                        'coalesce',
                        ['get', 'MIN_HEIGHT'],
                        0
                    ],
                    'fill-extrusion-opacity': 0.92,
                    'fill-extrusion-vertical-gradient': true
                }
            });
        }
    }

    map.on('style.load', () => {
        map.setLight({
            anchor: 'viewport',
            color: '#ffffff',
            intensity: 0.65,
            position: [2, 80, 70]
        });

        map.addLayer({
            id: 'sky',
            type: 'sky',
            paint: { 'sky-type': 'atmosphere', 'sky-atmosphere-sun-intensity': 18 }
        });

        loadCustomLayers();

        if (state.isInitialLoad) {
            fetch('./GEOJESN/GEOJESN_FIX/Batas Penelitian.geojson')
                .then(r => r.json())
                .then(data => {
                    map.fitBounds(turf.bbox(data), { padding: 60, pitch: 62, bearing: -35, duration: 2000 });
                });
            state.isInitialLoad = false;
        }
    });

    // Basemap switch
    document.getElementById('basemap-selector').addEventListener('change', e => {
        map.setStyle(e.target.value);
        map.once('style.load', () => {
            map.setLight({ anchor: 'viewport', color: '#ffffff', intensity: 0.65, position: [2, 80, 70] });
            loadCustomLayers();
        });
    });

    // Toggle
    function setupToggle(id, layerId, legendId) {
        document.getElementById(id).addEventListener('change', e => {
            const vis = e.target.checked ? 'visible' : 'none';
            state.layers[layerId] = e.target.checked;
            if (map.getLayer(layerId)) map.setLayoutProperty(layerId, 'visibility', vis);
            if (legendId) document.getElementById(legendId).style.display = e.target.checked ? 'block' : 'none';
            if (layerId === 'Bangunan 3D') document.getElementById('status-radios').style.display = e.target.checked ? 'block' : 'none';
        });
    }

    setupToggle('chk-batas', 'Batas Penelitian', 'legenda-batas');
    setupToggle('chk-zonasi', 'Zonasi RDTR', 'legenda-zonasi');
    setupToggle('chk-lahan', 'Bidang Lahan', 'legenda-lahan');
    setupToggle('chk-bangunan', 'Bangunan 3D', 'legenda-bangunan');

    // Warna radio
    document.querySelectorAll('input[name="status"]').forEach(r => {
        r.addEventListener('change', e => {
            state.bangunanColorProp = e.target.value;
            if (map.getLayer('Bangunan 3D')) {
                map.setPaintProperty('Bangunan 3D', 'fill-extrusion-color', getBangunanColor());
            }
        });
    });

    // Popup (diperbaiki)
    const popup = new maplibregl.Popup({ closeButton: true, closeOnClick: true });
    const formatNum = n => n ? parseFloat(n).toLocaleString('id-ID', {maximumFractionDigits: 2}) : '-';

    map.on('click', e => {
        const features = map.queryRenderedFeatures(e.point, { layers: ['Bangunan 3D', 'Bidang Lahan', 'Zonasi RDTR', 'Batas Penelitian'] });
        if (!features.length) return;

        const f = features[0];
        const p = f.properties;
        let html = '';

        if (f.layer.id === 'Bangunan 3D') {
            html = `
                <div class="popup-header">
                    <div class="popup-title">${p.NAMOBJ || 'Bangunan'}</div>
                    <div class="popup-subtitle">LOD2 • ${p.REMARK || ''}</div>
                </div>
                <table class="popup-table">
                    <tr><td>Tinggi Atap</td><td>: ${formatNum(p.MAX_HEIGHT || p.measuredHe || p.HMAX)} m</td></tr>
                    <tr><td>Tinggi Dasar</td><td>: ${formatNum(p.MIN_HEIGHT)} m</td></tr>
                    <tr><td>Luas Bangunan</td><td>: ${formatNum(p.LUAS_BGN)} m²</td></tr>
                    <tr><td>KDB</td><td>: ${formatNum(p.KDB)}% ${p.STS_KDB === 'Sesuai' ? '<span class="tag-sesuai">SESUAI</span>' : '<span class="tag-tidak">TIDAK</span>'}</td></tr>
                </table>
            `;
        } else {
            html = `<strong>${f.layer.id}</strong><br><pre style="font-size:11px">${JSON.stringify(p, null, 2)}</pre>`;
        }

        popup.setLngLat(e.lngLat).setHTML(html).addTo(map);
    });

    // Cursor
    const layers = ['Bangunan 3D','Bidang Lahan','Zonasi RDTR','Batas Penelitian'];
    layers.forEach(l => {
        map.on('mouseenter', l, () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', l, () => map.getCanvas().style.cursor = '');
    });
</script>
</body>
</html>
