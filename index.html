<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Visualisasi 3D WebGIS LOD2 - RDTR Bandung</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4;}
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        #control-panel {
            position: absolute;
            z-index: 1;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            width: 270px;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-height: 90vh;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 13px;
            font-weight: 800;
            color: #2c3e50;
            margin: 0 0 10px 0;
            padding-bottom: 6px;
            border-bottom: 2px solid #3498db;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .item-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
            color: #333;
            cursor: pointer;
        }

        .item-row input, .item-row select { margin-right: 10px; cursor: pointer; }

        #basemap-selector {
            width: 100%;
            padding: 7px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-bottom: 18px;
            font-size: 12px;
        }

        #status-radios {
            margin-left: 25px;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 2px solid #ddd;
        }

        .legend-section {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }

        .legend-title { font-size: 11px; font-weight: bold; margin-bottom: 8px; color: #555; text-transform: uppercase;}
        .legend-box { width: 14px; height: 14px; border-radius: 3px; margin-right: 8px; display: inline-block; vertical-align: middle; border: 1px solid rgba(0,0,0,0.2); }
        .legend-line { width: 16px; height: 3px; margin-right: 8px; display: inline-block; vertical-align: middle; }

        .maplibregl-popup-content {
            border-radius: 6px;
            padding: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            min-width: 260px;
        }
        .popup-header { margin: 0 0 8px; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .popup-title { font-size: 14px; font-weight: bold; margin: 0 0 2px 0; }
        .popup-subtitle { color: #7f8c8d; font-size: 11px; font-style: italic; margin: 0;}
        
        .popup-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 5px;}
        .popup-table tr { border-bottom: 1px solid #f1f2f6; }
        .popup-table td { padding: 5px 2px; vertical-align: top;}
        .popup-table td:first-child { font-weight: 600; color: #34495e; width: 40%;}
        
        .tag-sesuai { background: #28a745; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold;}
        .tag-tidak { background: #dc3545; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold;}
        .badge-info { background: #3498db; color: white; padding: 2px 5px; border-radius: 3px; font-size: 10px;}
    </style>
</head>
<body>

<div id="control-panel">
    <h3 class="panel-title">Pilihan Peta Dasar</h3>
    <select id="basemap-selector">
        <option value="https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json">Satelit / Berwarna (Voyager)</option>
        <option value="https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json">Gelap (Dark Matter)</option>
        <option value="https://basemaps.cartocdn.com/gl/positron-gl-style/style.json">Terang (Positron)</option>
    </select>

    <h3 class="panel-title">Pengaturan Peta</h3>
    <label class="item-row"><input type="checkbox" id="chk-batas" checked> Batas Penelitian</label>
    <label class="item-row"><input type="checkbox" id="chk-zonasi"> Zonasi RDTR</label>
    <label class="item-row"><input type="checkbox" id="chk-lahan"> Bidang Lahan</label>
    <label class="item-row"><input type="checkbox" id="chk-bangunan" checked> Bangunan LOD2 (3D)</label>

    <div id="status-radios">
        <div style="font-size: 11px; color:#777; margin-bottom: 6px; font-weight: bold;">TEMA WARNA BANGUNAN:</div>
        <label class="item-row"><input type="radio" name="status" value="default" checked> Warna Default</label>
        <label class="item-row"><input type="radio" name="status" value="STS_KDB"> Status KDB</label>
        <label class="item-row"><input type="radio" name="status" value="STS_KLB"> Status KLB</label>
        <label class="item-row"><input type="radio" name="status" value="STS_KDH"> Status KDH</label>
    </div>

    <h3 class="panel-title" style="margin-top: 15px;">Legenda Data</h3>
    
    <div id="legenda-batas" class="legend-section" style="display: block;">
        <div class="legend-title">Batas Penelitian</div>
        <div class="item-row"><span class="legend-line" style="background-color: #bc4749; height: 4px;"></span> Kawasan Studi</div>
    </div>
    
    <div id="legenda-zonasi" class="legend-section">
        <div class="legend-title">Zonasi RDTR</div>
        <div class="item-row"><span class="legend-box" style="background-color: #f2e8cf;"></span> Area Zonasi Tata Ruang</div>
    </div>
    
    <div id="legenda-lahan" class="legend-section">
        <div class="legend-title">Bidang Lahan</div>
        <div class="item-row"><span class="legend-line" style="background-color: #386641;"></span> Batas Persil (Hak Tanah)</div>
    </div>
    
    <div id="legenda-bangunan" class="legend-section" style="display: block;">
        <div class="legend-title">Bangunan LOD2</div>
        <div class="item-row"><span class="legend-box" style="background-color: #28a745;"></span> Memenuhi Ketentuan (Sesuai)</div>
        <div class="item-row"><span class="legend-box" style="background-color: #dc3545;"></span> Melanggar (Tidak Sesuai)</div>
        <div class="item-row"><span class="legend-box" style="background-color: #b5c99a;"></span> Mode Visual Default</div>
    </div>
</div>

<div id="map"></div>

<script>
    const state = {
        layers: {
            'Batas Penelitian': true, 
            'Zonasi RDTR': false,
            'Bidang Lahan': false,
            'Bangunan 3D': true
        },
        bangunanColorProp: 'default',
        isInitialLoad: true
    };

    const map = new maplibregl.Map({
        container: 'map',
        style: document.getElementById('basemap-selector').value,
        center: [107.61, -6.91],
        zoom: 16.5,
        pitch: 62,
        bearing: -35,
        antialias: true
    });

    map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');

    function getBangunanColor() {
        if (state.bangunanColorProp === 'default') return '#b5c99a';
        return [
            'match',
            ['get', state.bangunanColorProp],
            'Sesuai', '#28a745',
            'Tidak Sesuai', '#dc3545',
            '#b5c99a'
        ];
    }

    function loadCustomLayers() {
        // Batas Penelitian
        if (!map.getSource('batas')) {
            map.addSource('batas', { type: 'geojson', data: './GEOJESN/GEOJESN_FIX/Batas Penelitian.geojson' });
            map.addLayer({
                id: 'Batas Penelitian',
                type: 'line',
                source: 'batas',
                paint: { 'line-color': '#bc4749', 'line-width': 4, 'line-opacity': 0.9 },
                layout: { visibility: 'visible' }
            });
        }

        // Zonasi RDTR
        if (!map.getSource('zonasi')) {
            map.addSource('zonasi', { type: 'geojson', data: './GEOJESN/GEOJESN_FIX/Zonasi RDTR.geojson' });
            map.addLayer({
                id: 'Zonasi RDTR',
                type: 'fill',
                source: 'zonasi',
                paint: { 'fill-color': '#f2e8cf', 'fill-opacity': 0.5 },
                layout: { visibility: 'none' }
            });
        }

        // Bidang Lahan
        if (!map.getSource('lahan')) {
            map.addSource('lahan', { type: 'geojson', data: './GEOJESN/GEOJESN_FIX/Bidang Lahan.geojson' });
            map.addLayer({
                id: 'Bidang Lahan',
                type: 'line',
                source: 'lahan',
                paint: { 'line-color': '#386641', 'line-width': 1.8, 'line-opacity': 0.85 },
                layout: { visibility: 'none' }
            });
        }

        // ================== LOD2 BANGUNAN ==================
        if (!map.getSource('bangunan')) {
            map.addSource('bangunan', { 
                type: 'geojson', 
                data: './GEOJESN/GEOJESN_FIX/Bangunan_Kajian.geojson' 
            });

            // 1. BADAN BANGUNAN
            map.addLayer({
                id: 'Bangunan Body',
                type: 'fill-extrusion',
                source: 'bangunan',
                paint: {
                    'fill-extrusion-color': getBangunanColor(),
                    'fill-extrusion-height': ['coalesce', ['get', 'MIN_HEIGHT'], 0],
                    'fill-extrusion-base': 0,
                    'fill-extrusion-opacity': 0.85,
                    'fill-extrusion-vertical-gradient': true
                },
                layout: { visibility: 'visible' }
            });

            // 2. ATAP (Roof)
            map.addLayer({
                id: 'Bangunan Roof',
                type: 'fill-extrusion',
                source: 'bangunan',
                paint: {
                    'fill-extrusion-color': [
                        'case',
                        ['==', ['get', state.bangunanColorProp], 'Sesuai'], '#1e8449',
                        ['==', ['get', state.bangunanColorProp], 'Tidak Sesuai'], '#c0392b',
                        '#2c5f2d'
                    ],
                    'fill-extrusion-height': [
                        'coalesce', ['get', 'MAX_HEIGHT'], ['get', 'measuredHe'], ['get', 'HMAX'], 10
                    ],
                    'fill-extrusion-base': ['coalesce', ['get', 'MIN_HEIGHT'], 0],
                    'fill-extrusion-opacity': 0.95,
                    'fill-extrusion-vertical-gradient': true
                },
                layout: { visibility: 'visible' }
            });

            // 3. Outline Atap
            map.addLayer({
                id: 'Bangunan Roof Outline',
                type: 'line',
                source: 'bangunan',
                paint: {
                    'line-color': '#111',
                    'line-width': 1.2,
                    'line-opacity': 0.7
                },
                layout: { visibility: 'visible', 'line-join': 'round' }
            });
        }
    }

    map.on('style.load', () => {
        map.setLight({
            anchor: 'viewport',
            color: '#ffffff',
            intensity: 0.6,
            position: [1.8, 85, 75]
        });

        map.addLayer({
            id: 'sky',
            type: 'sky',
            paint: {
                'sky-type': 'atmosphere',
                'sky-atmosphere-sun': [0.0, 0.0],
                'sky-atmosphere-sun-intensity': 18
            }
        });

        loadCustomLayers();

        if (state.isInitialLoad) {
            fetch('./GEOJESN/GEOJESN_FIX/Batas Penelitian.geojson')
                .then(res => res.json())
                .then(data => {
                    const bbox = turf.bbox(data);
                    map.fitBounds(bbox, { 
                        padding: 60, 
                        pitch: 62, 
                        bearing: -35, 
                        duration: 2500 
                    });
                })
                .catch(err => console.error('Error Auto-Zoom:', err));
            state.isInitialLoad = false;
        }
    });

    // Basemap Change
    document.getElementById('basemap-selector').addEventListener('change', function(e) {
        map.setStyle(e.target.value);
        map.once('style.load', () => {
            map.setLight({ anchor: 'viewport', color: '#ffffff', intensity: 0.6, position: [1.8, 85, 75] });
            loadCustomLayers();
        });
    });

    // Toggle Layers
    function setupToggle(checkboxId, layerIds, legendId) {
        const ids = Array.isArray(layerIds) ? layerIds : [layerIds];
        document.getElementById(checkboxId).addEventListener('change', function(e) {
            const visible = e.target.checked ? 'visible' : 'none';
            ids.forEach(id => {
                if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', visible);
            });
            if (legendId) {
                const el = document.getElementById(legendId);
                if (el) el.style.display = e.target.checked ? 'block' : 'none';
            }
            if (ids[0].includes('Bangunan')) {
                document.getElementById('status-radios').style.display = e.target.checked ? 'block' : 'none';
            }
        });
    }

    setupToggle('chk-batas', 'Batas Penelitian', 'legenda-batas');
    setupToggle('chk-zonasi', 'Zonasi RDTR', 'legenda-zonasi');
    setupToggle('chk-lahan', 'Bidang Lahan', 'legenda-lahan');
    setupToggle('chk-bangunan', ['Bangunan Body', 'Bangunan Roof', 'Bangunan Roof Outline'], 'legenda-bangunan');

    // Radio Button Warna
    document.querySelectorAll('input[name="status"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            state.bangunanColorProp = e.target.value;
            const bodyColor = getBangunanColor();

            if (map.getLayer('Bangunan Body')) {
                map.setPaintProperty('Bangunan Body', 'fill-extrusion-color', bodyColor);
            }
            if (map.getLayer('Bangunan Roof')) {
                map.setPaintProperty('Bangunan Roof', 'fill-extrusion-color', [
                    'case',
                    ['==', ['get', state.bangunanColorProp], 'Sesuai'], '#1e8449',
                    ['==', ['get', state.bangunanColorProp], 'Tidak Sesuai'], '#c0392b',
                    '#2c5f2d'
                ]);
            }
        });
    });

    // Popup (sama seperti sebelumnya)
    const popup = new maplibregl.Popup({ closeButton: true, closeOnClick: true, maxWidth: '320px' });

    const formatNum = (num) => num ? parseFloat(num).toLocaleString('id-ID', {maximumFractionDigits: 2}) : '-';
    const formatStatus = (val) => val === 'Sesuai' ? `<span class="tag-sesuai">SESUAI</span>` : `<span class="tag-tidak">TIDAK SESUAI</span>`;

    map.on('click', (e) => {
        const features = map.queryRenderedFeatures(e.point, {
            layers: ['Bangunan Body', 'Bangunan Roof', 'Bidang Lahan', 'Zonasi RDTR', 'Batas Penelitian']
        });

        if (!features.length) return;

        const f = features[0];
        const p = f.properties;
        const layerId = f.layer.id;

        let html = '';

        if (layerId === 'Bangunan Body' || layerId === 'Bangunan Roof') {
            const bagian = (p.MIN_HEIGHT && p.MIN_HEIGHT > 0) ? 'Atap (Roof)' : 'Badan Bangunan';
            html = `
                <div class="popup-header">
                    <div class="popup-title">${p.NAMOBJ || 'Bangunan LOD2'}</div>
                    <div class="popup-subtitle">${p.REMARK || 'Tidak ada keterangan'} | ${bagian}</div>
                </div>
                <table class="popup-table">
                    <tr><td>NIB</td><td>: ${p.NIB || '-'}</td></tr>
                    <tr><td>Zonasi</td><td>: ${p.NM_ZONA || '-'} (${p.KD_ZONA || '-'})</td></tr>
                    <tr><td>Tinggi Puncak</td><td>: ${formatNum(p.MAX_HEIGHT || p.measuredHe || p.HMAX)} m</td></tr>
                    <tr><td>Tinggi Dasar Atap</td><td>: ${formatNum(p.MIN_HEIGHT || 0)} m</td></tr>
                    <tr><td>Luas Bangunan</td><td>: ${formatNum(p.LUAS_BGN)} m²</td></tr>
                    <tr><td colspan="2"><strong>Evaluasi:</strong></td></tr>
                    <tr><td>KDB</td><td>: ${formatNum(p.KDB)}% ${formatStatus(p.STS_KDB)}</td></tr>
                    <tr><td>KLB</td><td>: ${formatNum(p.KLB)} ${formatStatus(p.STS_KLB)}</td></tr>
                    <tr><td>KDH</td><td>: ${formatNum(p.KDH)}% ${formatStatus(p.STS_KDH)}</td></tr>
                </table>
            `;
        } else {
            // Popup untuk layer lain (bisa ditambah sendiri jika perlu)
            html = `<div class="popup-header"><div class="popup-title">${layerId}</div></div><pre>${JSON.stringify(p, null, 2)}</pre>`;
        }

        popup.setLngLat(e.lngLat).setHTML(html).addTo(map);
    });

    // Cursor pointer
    ['Bangunan Body', 'Bangunan Roof', 'Bidang Lahan', 'Zonasi RDTR', 'Batas Penelitian'].forEach(layer => {
        map.on('mouseenter', layer, () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', layer, () => map.getCanvas().style.cursor = '');
    });
</script>
</body>
</html>
